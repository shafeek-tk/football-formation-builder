<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Formation Builder - Minimal App</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
    <link rel="stylesheet" href="../css/pitch-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #fafafa;
            color: #1a1a1a;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        /* ===== HEADER ===== */
        .app-header {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            padding: 8px 12px 6px 12px;
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-height: 32px;
        }

        .app-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.3px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            background: transparent;
            color: #444;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
            line-height: 1;
        }

        .btn:hover {
            background: #2946f3;
            color: #fff;
            border-color: #2946f3;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn svg {
            width: 12px;
            height: 12px;
        }

        /* ===== CONTROLS ROW ===== */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            margin-top: 6px;
            min-height: 28px;
        }

        .formation-selectors {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .fm-group {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 0;
        }

        .fm-label {
            font-size: 10px;
            font-weight: 500;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .fm-select {
            font-family: 'Inter', system-ui, sans-serif !important;
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid #d0d0d0;
            border-radius: 0;
            padding: 2px 18px 2px 2px;
            cursor: pointer;
            transition: border-color 0.15s ease;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%23999' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 2px center;
            min-width: 58px;
        }

        .fm-select:focus {
            outline: none;
            border-bottom-color: #2946f3;
        }

        .fm-select:hover {
            border-bottom-color: #2946f3;
        }

        /* ===== MODE TOGGLE (pills) ===== */
        .mode-pills {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }

        .mode-pill {
            font-family: 'Inter', system-ui, sans-serif !important;
            font-size: 10px;
            font-weight: 500;
            padding: 3px 7px;
            border: 1px solid #d0d0d0;
            background: transparent;
            color: #888;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
            line-height: 1;
        }

        .mode-pill:first-child {
            border-radius: 4px 0 0 4px;
        }

        .mode-pill:last-child {
            border-radius: 0 4px 4px 0;
        }

        .mode-pill:not(:first-child) {
            border-left: none;
        }

        .mode-pill.active {
            background: #2946f3;
            border-color: #2946f3;
            color: #fff;
        }

        .mode-pill:not(.active):hover {
            background: #f0f0f0;
            color: #444;
        }

        /* ===== INTERACTION TOGGLE ===== */
        .interaction-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-top: 6px;
        }

        .interaction-toggle {
            display: flex;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            overflow: hidden;
            max-width: none;
            margin: 0;
        }

        .toggle-pill {
            font-family: 'Inter', system-ui, sans-serif !important;
            font-size: 10px;
            font-weight: 500;
            padding: 4px 12px;
            min-height: 0;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.3px;
        }

        .toggle-pill[data-mode="edit"].active {
            background: #2946f3;
            color: #fff;
        }

        .toggle-pill[data-mode="swap"].active {
            background: #2946f3;
            color: #fff;
        }

        .toggle-pill:not(.active):hover {
            background: #f0f0f0;
            color: #444;
        }

        .interaction-hint {
            font-size: 10px;
            color: #999;
            margin-left: 8px;
            text-align: left;
        }

        /* ===== FIELD AREA ===== */
        .field-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 6px;
            min-height: 0;
        }

        /* Override pitch-styles for this demo */
        .field-container {
            display: flex;
            justify-content: center;
            margin: 0;
            width: 100%;
            height: 100%;
        }

        .field {
            width: 100% !important;
            height: 100% !important;
            max-width: 500px;
            max-height: 100%;
            border: 2px solid #fff !important;
            border-radius: 6px !important;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12) !important;
            aspect-ratio: auto !important;
        }

        /* ===== PLAYER OVERRIDES ===== */
        .player-name {
            font-family: 'Inter', system-ui, sans-serif !important;
            font-size: min(2.6vw, 11px) !important;
            font-weight: 500 !important;
            border-radius: 3px !important;
            padding: 2px 4px !important;
            border: 1px solid rgba(255,255,255,0.15) !important;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3) !important;
            text-shadow: 0 1px 1px rgba(0,0,0,0.6) !important;
        }

        .player-number {
            font-family: 'Inter', system-ui, sans-serif !important;
        }

        /* Edit mode hover override */
        .field:not(.swap-mode):hover .player-name {
            border-color: #2946f3 !important;
            box-shadow: 0 0 6px rgba(41,70,243,0.3) !important;
        }

        /* Swap selected override */
        .swap-selected .player-icon {
            outline-color: #2946f3 !important;
        }

        .swap-selected .player-name {
            border-color: #2946f3 !important;
            box-shadow: 0 0 10px rgba(41,70,243,0.6), 0 0 3px rgba(41,70,243,0.3) inset !important;
            background: linear-gradient(135deg, rgba(41,70,243,0.2), rgba(0,0,0,0.7)) !important;
        }

        /* Loading indicator override */
        .loading-indicator {
            display: none;
            font-size: 11px;
            color: #2946f3;
            text-align: center;
        }

        /* Footer override - hide common-footer if it loads */
        .footer {
            display: none !important;
        }

        /* ===== DESKTOP ===== */
        @media (min-width: 769px) {
            .app-header {
                padding: 10px 20px 8px 20px;
            }

            .app-title {
                font-size: 15px;
            }

            .btn {
                padding: 6px 14px;
                font-size: 12px;
            }

            .fm-select {
                font-size: 14px;
                min-width: 70px;
            }

            .mode-pill {
                font-size: 11px;
                padding: 4px 10px;
            }

            .toggle-pill {
                font-size: 11px;
                padding: 5px 14px;
            }

            .interaction-hint {
                font-size: 11px;
            }

            .field-area {
                padding: 10px;
            }

            .field {
                max-width: 520px;
            }
        }

        /* ===== SMALL MOBILE ===== */
        @media (max-width: 374px) {
            .app-title {
                font-size: 12px;
            }

            .btn {
                padding: 4px 7px;
                font-size: 10px;
            }

            .btn span.btn-label {
                display: none;
            }

            .fm-label {
                font-size: 9px;
            }

            .fm-select {
                font-size: 12px;
                min-width: 50px;
            }

            .mode-pill {
                font-size: 9px;
                padding: 3px 5px;
            }

            .toggle-pill {
                font-size: 9px;
                padding: 3px 8px;
            }

            .interaction-hint {
                font-size: 9px;
            }
        }

        /* ===== VERY SHORT SCREENS ===== */
        @media (max-height: 600px) {
            .app-header {
                padding: 4px 10px 4px 10px;
            }

            .controls-row {
                margin-top: 3px;
            }

            .interaction-bar {
                margin-top: 3px;
            }

            .field-area {
                padding: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="app-header">
        <!-- Row 1: Title + Action Buttons -->
        <div class="header-row">
            <div class="app-title">Formation Builder</div>
            <div class="header-actions">
                <button class="btn" onclick="formationBuilder.shareFormation()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                    <span class="btn-label">Share</span>
                </button>
                <button class="btn" onclick="formationBuilder.downloadImage()" id="downloadBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span class="btn-label">Download</span>
                </button>
            </div>
        </div>

        <!-- Row 2: Formations + Mode pills -->
        <div class="controls-row">
            <div class="formation-selectors">
                <div class="fm-group">
                    <span class="fm-label">Blue</span>
                    <select id="myTeamFormation" onchange="formationBuilder.loadFormation()" class="fm-select">
                        <option value="442">4-4-2</option>
                        <option value="433">4-3-3</option>
                        <option value="4231">4-2-3-1</option>
                        <option value="352">3-5-2</option>
                        <option value="343">3-4-3</option>
                        <option value="532">5-3-2</option>
                        <option value="451">4-5-1</option>
                        <option value="541">5-4-1</option>
                        <option value="4141">4-1-4-1</option>
                        <option value="3421">3-4-2-1</option>
                        <option value="4321">4-3-2-1</option>
                        <option value="41212">4-1-2-1-2</option>
                        <option value="4132">4-1-3-2</option>
                        <option value="4213">4-2-1-3</option>
                        <option value="523">5-2-3</option>
                        <option value="4312">4-3-1-2</option>
                        <option value="334">3-3-4</option>
                        <option value="460">4-6-0</option>
                        <option value="5221">5-2-2-1</option>
                        <option value="424">4-2-4</option>
                        <option value="235">2-3-5</option>
                        <option value="325">3-2-5</option>
                        <option value="253">2-5-3</option>
                    </select>
                </div>
                <div class="fm-group">
                    <span class="fm-label">Red</span>
                    <select id="awayTeamFormation" onchange="formationBuilder.loadFormation()" class="fm-select">
                        <option value="442">4-4-2</option>
                        <option value="433">4-3-3</option>
                        <option value="4231">4-2-3-1</option>
                        <option value="352">3-5-2</option>
                        <option value="343">3-4-3</option>
                        <option value="532">5-3-2</option>
                        <option value="451">4-5-1</option>
                        <option value="541">5-4-1</option>
                        <option value="4141">4-1-4-1</option>
                        <option value="3421">3-4-2-1</option>
                        <option value="4321">4-3-2-1</option>
                        <option value="41212">4-1-2-1-2</option>
                        <option value="4132">4-1-3-2</option>
                        <option value="523">5-2-3</option>
                        <option value="4213">4-2-1-3</option>
                        <option value="4312">4-3-1-2</option>
                        <option value="334">3-3-4</option>
                        <option value="460">4-6-0</option>
                        <option value="5221">5-2-2-1</option>
                        <option value="424">4-2-4</option>
                        <option value="235">2-3-5</option>
                        <option value="325">3-2-5</option>
                        <option value="253">2-5-3</option>
                    </select>
                </div>
            </div>
            <div class="mode-pills" id="modePills">
                <a href="#" class="mode-pill active" data-mode="11v11">11v11</a>
                <a href="#" class="mode-pill" data-mode="7v7">7v7</a>
                <a href="#" class="mode-pill" data-mode="6v6">6v6</a>
            </div>
        </div>

        <!-- Row 3: Interaction toggle -->
        <div class="interaction-bar">
            <div id="interactionToggleContainer"></div>
        </div>

        <div id="loadingIndicator" class="loading-indicator">Loading formation...</div>
    </div>

    <div class="field-area">
        <div class="field-container">
            <div id="field" class="field"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="../js/pitch-common.js"></script>
    <script src="../js/formations.js"></script>
    <script src="../js/formation-builder.js"></script>
    <script>
        // Initialize with 11v11 by default
        let formationBuilder;
        let currentMode = '11v11';

        function initBuilder(gameType) {
            const configs = {
                '11v11': {
                    gameType: '11v11',
                    formations: FORMATIONS_11V11,
                    defaultNames: DEFAULT_NAMES_11V11,
                    defaultAwayNames: DEFAULT_AWAY_NAMES_11V11,
                    fieldMargin: 8,
                    defaultAwayFormation: FORMATIONS_11V11['442'],
                    defaultAwayFormationKey: '442'
                },
                '7v7': {
                    gameType: '7v7',
                    formations: typeof FORMATIONS_7V7 !== 'undefined' ? FORMATIONS_7V7 : FORMATIONS_11V11,
                    defaultNames: typeof DEFAULT_NAMES_7V7 !== 'undefined' ? DEFAULT_NAMES_7V7 : DEFAULT_NAMES_11V11,
                    defaultAwayNames: typeof DEFAULT_AWAY_NAMES_7V7 !== 'undefined' ? DEFAULT_AWAY_NAMES_7V7 : DEFAULT_AWAY_NAMES_11V11,
                    fieldMargin: 8,
                    defaultAwayFormation: typeof FORMATIONS_7V7 !== 'undefined' ? FORMATIONS_7V7['231'] : FORMATIONS_11V11['442'],
                    defaultAwayFormationKey: typeof FORMATIONS_7V7 !== 'undefined' ? '231' : '442'
                },
                '6v6': {
                    gameType: '6v6',
                    formations: typeof FORMATIONS_6V6 !== 'undefined' ? FORMATIONS_6V6 : FORMATIONS_11V11,
                    defaultNames: typeof DEFAULT_NAMES_6V6 !== 'undefined' ? DEFAULT_NAMES_6V6 : DEFAULT_NAMES_11V11,
                    defaultAwayNames: typeof DEFAULT_AWAY_NAMES_6V6 !== 'undefined' ? DEFAULT_AWAY_NAMES_6V6 : DEFAULT_AWAY_NAMES_11V11,
                    fieldMargin: 8,
                    defaultAwayFormation: typeof FORMATIONS_6V6 !== 'undefined' ? FORMATIONS_6V6['221'] : FORMATIONS_11V11['442'],
                    defaultAwayFormationKey: typeof FORMATIONS_6V6 !== 'undefined' ? '221' : '442'
                }
            };

            const config = configs[gameType] || configs['11v11'];
            formationBuilder = new FormationBuilder(config);

            // Update formation dropdowns for the current mode
            updateFormationOptions(config.formations);
        }

        function updateFormationOptions(formations) {
            const homeSelect = document.getElementById('myTeamFormation');
            const awaySelect = document.getElementById('awayTeamFormation');
            if (!homeSelect || !awaySelect) return;

            const keys = Object.keys(formations);
            const optionsHTML = keys.map(key => {
                const label = key.replace(/(\d)/g, '$1-').replace(/-$/, '').replace(/^(\d)-/, '$1-');
                // Build a nicer label
                const nice = formatFormationLabel(key);
                return `<option value="${key}">${nice}</option>`;
            }).join('');

            homeSelect.innerHTML = optionsHTML;
            awaySelect.innerHTML = optionsHTML;
        }

        function formatFormationLabel(key) {
            // Convert "442" -> "4-4-2", "4231" -> "4-2-3-1", etc.
            const digits = key.split('');
            return digits.join('-');
        }

        // Mode pill switching
        document.getElementById('modePills').addEventListener('click', function(e) {
            e.preventDefault();
            const pill = e.target.closest('.mode-pill');
            if (!pill || pill.classList.contains('active')) return;

            document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');

            currentMode = pill.dataset.mode;
            initBuilder(currentMode);
        });

        // Boot
        initBuilder('11v11');
    </script>
</body>
</html>
